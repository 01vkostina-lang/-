const URL_REGEX = /https?:\/\/[^\s,]+/g;

function extractUrls(str) {
  if (!str) return [];
  return str.match(URL_REGEX) || [];
}

function makeTgLink(tg) {
  if (!tg) return '';
  tg = tg.trim().replace(/^\n/, '').trim();
  if (tg.startsWith('@')) return 'https://t.me/' + tg.slice(1);
  if (tg.startsWith('t.me/')) return 'https://' + tg;
  if (tg.startsWith('https://t.me/')) return tg;
  return 'https://t.me/' + tg;
}

function makeVkLink(vk) {
  if (!vk) return '';
  vk = vk.trim();
  if (vk.startsWith('http')) return vk;
  if (vk.startsWith('vk.')) return 'https://' + vk;
  return vk;
}

function tgDisplay(tg) {
  if (!tg) return '';
  tg = tg.trim().replace(/^\n/, '').trim();
  if (tg.startsWith('https://t.me/')) return '@' + tg.replace('https://t.me/', '');
  if (tg.startsWith('t.me/')) return '@' + tg.replace('t.me/', '');
  if (tg.startsWith('@')) return tg;
  return '@' + tg;
}

function formatPhone(phone) {
  if (!phone) return '';
  let p = String(phone).replace(/[^0-9+]/g, '');
  if (p.length === 11 && (p.startsWith('7') || p.startsWith('8'))) p = '+7' + p.slice(1);
  if (p.startsWith('+7') && p.length === 12) {
    return '+7 (' + p.slice(2,5) + ') ' + p.slice(5,8) + '-' + p.slice(8,10) + '-' + p.slice(10,12);
  }
  return p;
}

function shortUrl(url) {
  return url.replace(/https?:\/\//, '').replace(/\/$/, '').replace(/^www\./, '');
}

function escHTML(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderMember(m, isExpert) {
  let links = '';
  if (m.vk) links += '<a class="link-vk" href="' + escHTML(makeVkLink(m.vk)) + '" target="_blank" rel="noopener">VK</a>';
  if (m.tg) links += '<a class="link-tg" href="' + escHTML(makeTgLink(m.tg)) + '" target="_blank" rel="noopener">' + escHTML(tgDisplay(m.tg)) + '</a>';
  if (m.phone) links += '<a class="link-phone" href="tel:' + escHTML(m.phone) + '">' + escHTML(formatPhone(m.phone)) + '</a>';
  if (m.project_link) {
    const urls = extractUrls(m.project_link);
    urls.forEach(url => {
      const short = shortUrl(url);
      links += '<a class="link-project" href="' + escHTML(url) + '" target="_blank" rel="noopener">' + escHTML(short.length > 32 ? short.slice(0,30) + '…' : short) + '</a>';
    });
  }
  
  let html = '<div class="member-card">';
  html += '<div class="member-name">' + escHTML(m.surname) + ' ' + escHTML(m.name);
  if (isExpert) html += '<span class="expert-badge">Эксперт</span>';
  html += '</div>';
  if (m.org) html += '<div class="member-org">' + escHTML(m.org) + '</div>';
  if (links) html += '<div class="member-links">' + links + '</div>';
  if (m.team_member) html += '<div class="member-team">Член команды: ' + escHTML(m.team_member) + '</div>';
  html += '</div>';
  return html;
}

const collapsedCities = new Set();

function render() {
  const query = searchBox.value.toLowerCase().trim();
  const cityVal = cityFilter.value;
  
  let filtered = DATA.filter(m => {
    if (cityVal && m.city !== cityVal) return false;
    if (query) {
      const text = (m.surname + ' ' + m.name + ' ' + m.city + ' ' + m.org + ' ' + m.tg + ' ' + m.team_member).toLowerCase();
      return text.includes(query);
    }
    return true;
  });
  
  const groups = {};
  filtered.forEach(m => {
    const c = m.city || 'Без города';
    if (!groups[c]) groups[c] = [];
    groups[c].push(m);
  });
  
  const orderedCities = [];
  DATA.forEach(m => {
    const c = m.city || 'Без города';
    if (groups[c] && !orderedCities.includes(c)) orderedCities.push(c);
  });
  
  const participantsFiltered = filtered.filter(m => m.city !== 'Эксперты Клуба');
  statMembers.textContent = participantsFiltered.length;
  
  statsBar.textContent = 'Показано ' + filtered.length + ' из ' + DATA.length + ' участников';
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">Ничего не найдено</div>';
    return;
  }
  
  let html = '';
  orderedCities.forEach(city => {
    const mems = groups[city];
    const isExpert = city === 'Эксперты Клуба';
    const isNonAtomic = NON_ATOMIC.includes(city);
    const isCollapsed = collapsedCities.has(city);
    html += '<div class="city-group">';
    html += '<div class="city-header' + (isExpert ? ' expert' : isNonAtomic ? ' non-atomic' : '') + (isCollapsed ? ' collapsed' : '') + '" data-city="' + escHTML(city) + '">';
    html += '<span><span class="arrow">&#9660;</span> ' + escHTML(city);
    if (isNonAtomic) html += '<span class="non-atomic-note">(не атомный город)</span>';
    html += '</span>';
    html += '<span class="count">' + mems.length + '</span>';
    html += '</div>';
    html += '<div class="members-list' + (isCollapsed ? ' hidden' : '') + '">';
    mems.forEach(m => { html += renderMember(m, isExpert); });
    html += '</div></div>';
  });
  
  container.innerHTML = html;
  
  document.querySelectorAll('.city-header').forEach(el => {
    el.addEventListener('click', () => {
      const city = el.dataset.city;
      if (collapsedCities.has(city)) collapsedCities.delete(city); else collapsedCities.add(city);
      el.classList.toggle('collapsed');
      el.nextElementSibling.classList.toggle('hidden');
    });
  });
}

searchBox.addEventListener('input', () => { updateResetVisibility(); render(); });
cityFilter.addEventListener('change', () => { updateResetVisibility(); render(); });
render();
</script>
</body>
</html>
